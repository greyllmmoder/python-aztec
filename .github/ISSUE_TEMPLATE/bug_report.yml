name: Bug report
description: Report a reproducible defect
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Minimal reproducible steps and payload.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, OS, package version, scanner/runtime details.
    validations:
      required: true
