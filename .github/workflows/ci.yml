name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,image,pdf]"

      - name: Run tests
        run: |
          pytest -q

  conformance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,image,pdf]"

      - name: Generate conformance evidence
        run: |
          python scripts/conformance_report.py \
            --report conformance_report.md \
            --json conformance_report.json \
            --matrix-report compat_matrix_report.md

      - name: Upload conformance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conformance-evidence
          path: |
            conformance_report.md
            conformance_report.json
            compat_matrix_report.md

  quality:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,image,pdf]"

      - name: Lint
        run: |
          ruff check .

      - name: Type check
        run: |
          mypy --strict aztec_py

  build:
    runs-on: ubuntu-latest
    needs: [quality, conformance]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install build
          python -m build
